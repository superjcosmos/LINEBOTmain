<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J Cosmos — LINE Bot API 管理平台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:Arial,sans-serif}
body{background:#0d0704;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px}

.starfield{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.starfield span{position:absolute;border-radius:50%;background:#e8c08a;animation:twinkle var(--d) ease-in-out infinite alternate}
@keyframes twinkle{0%{opacity:.15}100%{opacity:.7}}

.scene{width:420px;max-width:100%;perspective:1200px;position:relative;z-index:1;cursor:pointer}
.card-inner{width:100%;aspect-ratio:420/240;position:relative;transform-style:preserve-3d;transition:transform .75s cubic-bezier(.4,0,.2,1)}
.scene.flipped .card-inner{transform:rotateY(180deg)}

.face{position:absolute;inset:0;border-radius:20px;backface-visibility:hidden;overflow:hidden}
.scene .front{pointer-events:auto}
.scene .back{pointer-events:none}
.scene.flipped .front{pointer-events:none}
.scene.flipped .back{pointer-events:auto}
.front{background:radial-gradient(ellipse at 30% 45%, #3a2415 0%, #1c1009 55%, #120a06 100%)}
.back{background:radial-gradient(ellipse at 35% 70%, #341f10 0%, #180f08 60%, #100905 100%);transform:rotateY(180deg)}

/* ── 正面：軌道 + 行星 SVG ── */
.orbit-svg{position:absolute;inset:0;z-index:1}

/* ── 正面文字：置右下 ── */
.front-inner{position:relative;z-index:2;padding:20px 26px;height:100%;display:flex;flex-direction:column;justify-content:space-between}
.corner-hint{font-size:10px;color:rgba(232,192,138,.35);letter-spacing:1px}
.brand-block{align-self:flex-end;text-align:right;max-width:340px}
.brand-row{display:flex;align-items:center;justify-content:flex-end;gap:8px}
.logo-circle{width:22px;height:22px;background:#06C755;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;font-family:Arial,sans-serif;flex-shrink:0}
.brand-title{font-family:Georgia,'Noto Serif TC','Noto Serif CJK TC',serif;font-size:24px;font-weight:600;color:#f6e4c4;letter-spacing:.5px}
.brand-title .dot{font-size:16px;color:#e8c08a;vertical-align:2px;margin:0 2px;opacity:.85}
.brand-sub{font-size:9px;color:rgba(232,192,138,.6);letter-spacing:2.2px;text-transform:uppercase;margin-top:3px}
.tagline-main{font-size:12px;color:rgba(255,255,255,.85);margin-top:12px}
.tagline-desc{font-size:10px;color:rgba(232,192,138,.5);margin-top:3px}
.owner-tag{font-size:9.5px;color:rgba(232,192,138,.4);margin-top:8px}

/* ── 背面裝飾圓 ── */
.bg-ring{position:absolute;border-radius:50%;border:1px solid rgba(232,192,138,.14)}
.bg-ring-a{width:290px;height:290px;top:-50px;right:-70px}
.bg-ring-b{width:170px;height:170px;bottom:-40px;left:-25px}

.back-inner{position:relative;z-index:2;padding:22px 28px;height:100%;display:flex;flex-direction:column;justify-content:space-between}
.feat-label{font-size:12px;font-weight:500;color:#fff;margin-bottom:8px}
.feat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px 10px}
.feat-item{display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,.78)}
.feat-dot{width:4px;height:4px;border-radius:50%;background:#06C755;flex-shrink:0}
.back-foot{display:flex;justify-content:space-between;align-items:flex-end}
.contact-block .c-label{font-size:10px;color:rgba(232,192,138,.6)}
.contact-block .c-email{font-size:11.5px;color:#f0d9ae;margin-top:2px}
.contact-block .c-owner{font-size:10px;color:rgba(232,192,138,.45);margin-top:2px}
.contact-block .c-line{font-size:11.5px;color:#06C755;margin-top:2px;text-decoration:none;display:block;font-weight:600}
.contact-block .c-line:hover{text-decoration:underline}
.cta{background:#06C755;color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:12px;font-weight:500;cursor:pointer;letter-spacing:.3px;text-decoration:none;display:inline-block}
.cta:hover{background:#05b34c}

.controls{margin-top:20px;display:flex;flex-direction:column;align-items:center;gap:10px;position:relative;z-index:1}
.hint-txt{font-size:12px;color:rgba(232,192,138,.45)}
.flip-btn{background:transparent;border:1px solid rgba(232,192,138,.25);border-radius:8px;padding:8px 28px;font-size:13px;color:rgba(232,192,138,.75);cursor:pointer;letter-spacing:.5px}
.flip-btn:hover{border-color:rgba(232,192,138,.55);color:#f0d9ae}

.share-row{margin-top:28px;display:flex;gap:10px;position:relative;z-index:1;flex-wrap:wrap;justify-content:center}
.share-btn{background:transparent;border:1px solid rgba(232,192,138,.25);border-radius:8px;padding:7px 18px;font-size:12px;color:rgba(232,192,138,.65);cursor:pointer}
.share-btn:hover{border-color:rgba(232,192,138,.55);color:#f0d9ae}

@media(max-width:460px){
  .scene{width:100%}
  .feat-grid{grid-template-columns:repeat(2,1fr)}
}
@media(prefers-reduced-motion:reduce){
  .card-inner{transition:none}
  .starfield span{animation:none;opacity:.3}
}
</style>
</head>
<body>

<div class="starfield" aria-hidden="true" id="sf"></div>

<div class="scene" id="scene" onclick="this.classList.toggle('flipped')" role="button" aria-label="點擊翻轉名片">
  <div class="card-inner">

    <div class="face front">
      <svg class="orbit-svg" viewBox="0 0 420 240" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="ringA" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f6e4c4" stop-opacity="0.85"/>
            <stop offset="100%" stop-color="#e28fae" stop-opacity="0.15"/>
          </linearGradient>
          <linearGradient id="ringB" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#e0a755" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="#e0a755" stop-opacity="0.05"/>
          </linearGradient>
        </defs>
        <g transform="translate(150,120) rotate(-16)">
          <ellipse cx="0" cy="0" rx="150" ry="52" fill="none" stroke="url(#ringA)" stroke-width="1.3"/>
          <ellipse cx="0" cy="0" rx="118" ry="41" fill="none" stroke="url(#ringB)" stroke-width="1.1"/>
          <ellipse cx="0" cy="0" rx="86" ry="30" fill="none" stroke="rgba(246,228,196,0.3)" stroke-width="1"/>
        </g>
        <circle cx="62" cy="76" r="3.4" fill="#f4c94f"/>
        <circle cx="62" cy="76" r="7.5" fill="#f4c94f" opacity="0.25"/>
        <circle cx="128" cy="60" r="2.2" fill="#fff" opacity="0.9"/>
        <circle cx="210" cy="52" r="3" fill="#f4c94f"/>
        <circle cx="210" cy="52" r="6.5" fill="#f4c94f" opacity="0.22"/>
        <circle cx="262" cy="82" r="3.6" fill="#e8935f"/>
        <circle cx="262" cy="82" r="7.5" fill="#e8935f" opacity="0.2"/>
        <circle cx="118" cy="108" r="2.4" fill="#e26f9a"/>
      </svg>

      <div class="front-inner">
        <div class="corner-hint">J COSMOS</div>
        <div class="brand-block">
          <div class="brand-row">
            <div class="logo-circle">J</div>
            <div class="brand-title">J Cosmos<span class="dot">‧</span>J宇宙</div>
          </div>
          <div class="brand-sub">LINE BOT API 管理平台</div>
          <div class="tagline-main">行銷自動化 · 智慧管理</div>
          <div class="tagline-desc">讓 LINE Bot 成為您最強的業務助手</div>
          <div class="owner-tag">專案負責人　J</div>
        </div>
      </div>
    </div>

    <div class="face back">
      <div class="bg-ring bg-ring-a"></div>
      <div class="bg-ring bg-ring-b"></div>
      <div class="back-inner">
        <div>
          <div class="feat-label">核心功能</div>
          <div class="feat-grid">
            <div class="feat-item"><span class="feat-dot"></span>自動回覆管理</div>
            <div class="feat-item"><span class="feat-dot"></span>受眾精準推播</div>
            <div class="feat-item"><span class="feat-dot"></span>圖文選單設計</div>
            <div class="feat-item"><span class="feat-dot"></span>小遊戲互動</div>
            <div class="feat-item"><span class="feat-dot"></span>推薦集點機制</div>
            <div class="feat-item"><span class="feat-dot"></span>數據儀表板</div>
            <div class="feat-item"><span class="feat-dot"></span>黑名單管理</div>
            <div class="feat-item"><span class="feat-dot"></span>資料匯出</div>
            <div class="feat-item"><span class="feat-dot"></span>系統管理後台</div>
          </div>
        </div>
        <div class="back-foot">
          <div class="contact-block">
            <div class="c-label">聯絡我們</div>
            <div class="c-email">superjcosmos@gmail.com</div>
            <a class="c-line" href="https://line.me/R/ti/p/@567zuvof" target="_blank" rel="noopener" onclick="event.stopPropagation()">LINE：@567zuvof</a>
            <div class="c-owner">專案負責人　J</div>
          </div>
          <a class="cta" href="https://superjcosmos.github.io/LINEBOTmain/" target="_blank" rel="noopener" onclick="event.stopPropagation()">立即體驗</a>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="controls">
  <span class="hint-txt">點擊名片或按鈕翻轉</span>
  <button class="flip-btn" onclick="document.getElementById('scene').classList.toggle('flipped')">翻轉名片</button>
</div>

<div class="share-row">
  <button class="share-btn" onclick="copyLink()">複製名片連結</button>
  <a class="share-btn" href="https://superjcosmos.github.io/LINEBOTmain/" target="_blank" rel="noopener" style="text-decoration:none">前往後台</a>
</div>

<script>
(function(){
  var sf=document.getElementById('sf');
  var stars=[
    {s:2,t:8,l:15,d:2.8},{s:3,t:12,l:42,d:3.5},{s:2,t:5,l:68,d:2.1},
    {s:4,t:22,l:85,d:4.2},{s:2,t:35,l:8,d:3.1},{s:3,t:45,l:55,d:2.7},
    {s:2,t:60,l:30,d:3.8},{s:4,t:70,l:72,d:2.4},{s:3,t:80,l:90,d:3.3},
    {s:2,t:90,l:18,d:4.5},{s:3,t:15,l:95,d:2.9},{s:2,t:50,l:48,d:3.6},
    {s:3,t:28,l:78,d:2.3},{s:2,t:65,l:62,d:4.1},{s:4,t:88,l:38,d:3.0}
  ];
  stars.forEach(function(s){
    var el=document.createElement('span');
    el.style.cssText='width:'+s.s+'px;height:'+s.s+'px;top:'+s.t+'%;left:'+s.l+'%;--d:'+s.d+'s';
    sf.appendChild(el);
  });
})();

function copyLink(){
  var url=window.location.href;
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(function(){alert('連結已複製！');});
  } else {
    var ta=document.createElement('textarea');
    ta.value=url;document.body.appendChild(ta);ta.select();
    document.execCommand('copy');document.body.removeChild(ta);
    alert('連結已複製！');
  }
}
</script>
</body>
</html>
