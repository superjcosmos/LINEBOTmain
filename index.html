<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINE Bot 管理後台</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Toast 通知 -->
<div class="toast" id="toast"></div>
  
<!-- 全域 Loading -->
<div id="global-loading" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:9998;align-items:center;justify-content:center">
  <div style="background:white;border-radius:16px;padding:32px 40px;display:flex;flex-direction:column;align-items:center;gap:16px;box-shadow:0 8px 32px rgba(0,0,0,0.15)">
    <div style="width:40px;height:40px;border:4px solid #e0e0e0;border-top-color:#06C755;border-radius:50%;animation:spin 0.8s linear infinite"></div>
    <div style="color:#444;font-size:14px;font-weight:500">處理中，請稍候...</div>
  </div>
</div>

<!-- 登入頁 -->
<div id="loginPage">
  <div class="login-box">
    <div class="logo">
      <p>J Cosmos</p>
      <h1>LINE BOT API 管理後台</h1>
    </div>
    <div class="form-group">
      <label>電子信箱</label>
      <input type="email" id="inputEmail" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label>密碼</label>
      <input type="password" id="inputPassword" placeholder="••••••••">
    </div>
    <button class="btn-login" id="btnLogin" onclick="login()">登入</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>
</div>

<!-- 主介面 -->
<div id="mainPage" style="display:none">
  <div class="sidebar">
    <div class="sidebar-logo">
      <p style="color:#06C755;font-size:11px;font-weight:600;letter-spacing:1px;margin-bottom:4px">J Cosmos</p>
      <h2>LINE BOT API 管理後台</h2>
      <p class="email" id="sidebarEmail"></p>
      <span class="plan" id="sidebarPlan"></span>
    </div>
    <div class="sidebar-menu" id="sidebarMenu">
      <!-- 由 buildSidebarMenu() 動態產生 -->
    </div>
    <div class="sidebar-footer">
      <button class="btn-init" onclick="openChangePasswordModal()">🔑 修改密碼</button>
      <button class="btn-logout" onclick="logout()">登出</button>
    </div> 
  </div>
  <div class="main-content" id="mainContent">
    <div class="loading">載入中...</div>
  </div>
</div>

<!-- JS 載入順序：pages 必須在 router 之後，auth 最後 -->
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/pages/userlog.js"></script>
<script src="js/pages/reply.js"></script>
<script src="js/pages/audience.js"></script>
<script src="js/pages/richmenu.js"></script>
<script src="js/pages/lottery.js"></script>
<script src="js/pages/broadcast.js"></script>
<script src="js/pages/dashboard.js"></script>
<script src="js/pages/account.js"></script>
<script src="js/pages/export.js"></script>  
<script src="js/pages/blacklist.js"></script>
<script src="js/pages/export.js"></script>  
<script src="js/router.js"></script>
<script src="js/auth.js"></script>

</body>
  <div id="global-modal"></div>
</html>
