<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINE Bot 管理後台</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Toast 通知 -->
<div class="toast" id="toast"></div>

<!-- 登入頁 -->
<div id="loginPage">
  <div class="login-box">
    <div class="logo">
      <h1>● LINE Bot 後台</h1>
      <p>行銷自動化管理系統</p>
    </div>
    <div class="form-group">
      <label>電子信箱</label>
      <input type="email" id="inputEmail" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label>密碼</label>
      <input type="password" id="inputPassword" placeholder="••••••••">
    </div>
    <button class="btn-login" id="btnLogin" onclick="login()">登入</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>
</div>

<!-- 主介面 -->
<div id="mainPage">
  <div class="sidebar">
    <div class="sidebar-logo">
      <h2>LINE Bot 後台</h2>
      <p class="email" id="sidebarEmail"></p>
      <span class="plan" id="sidebarPlan"></span>
    </div>
    <div class="sidebar-menu">
      <div class="menu-item" data-page="userlog"  onclick="navigateTo('userlog')">
        <span class="menu-icon">📊</span> UserLog
      </div>
      <div class="menu-item" data-page="reply"    onclick="navigateTo('reply')">
        <span class="menu-icon">💬</span> 自動回覆
      </div>
      <div class="menu-item" data-page="audience" onclick="navigateTo('audience')">
        <span class="menu-icon">👥</span> 受眾管理
      </div>
      <div class="menu-item" data-page="richmenu" onclick="navigateTo('richmenu')">
        <span class="menu-icon">🖼️</span> 圖文選單
      </div>
      <div class="menu-item" data-page="lottery"  onclick="navigateTo('lottery')">
        <span class="menu-icon">🎰</span> 小遊戲
      </div>
    </div>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="logout()">登出</button>
    </div>
  </div>

  <div class="main-content" id="mainContent">
    <div class="loading">載入中...</div>
  </div>
</div>

<!-- JS 載入順序很重要，不能亂 -->
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/router.js"></script>
<script src="js/pages/userlog.js"></script>
<script src="js/pages/reply.js"></script>
<script src="js/pages/audience.js"></script>
<script src="js/pages/richmenu.js"></script>
<script src="js/pages/lottery.js"></script>
<script src="js/auth.js"></script>
